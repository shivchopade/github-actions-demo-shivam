name: Shivam's CI , CD Workflow

on:
  workflow_run:
    workflows: ["Shivam's CI , CD Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clone repo if not exists
            if [ ! -d "github-actions-demo-shivam" ]; then
              git clone https://github.com/shivchopade/github-actions-demo-shivam.git
            fi

            # Go to project folder
            cd github-actions-demo-shivam

            # Pull latest code (frontend, nginx config, docker-compose, etc.)
            git pull origin main

            # Pull latest backend image from DockerHub
            docker compose pull

            # Recreate all containers (force-recreate ensures nginx picks up new files)
            docker compose down
            docker compose up -d --force-recreate