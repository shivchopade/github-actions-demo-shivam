name: TWS CD Workflow

on:
  workflow_run:
    workflows: ["TWS CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="github-actions-demo-shivam"

            # Clone only once
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/shivchopade/github-actions-demo-shivam.git
            fi

            cd "$REPO_DIR"

            # Fast update (no heavy reset)
            git pull origin main

            # Only pull updated images (fast if unchanged)
            docker compose pull

            # Restart only changed containers
            docker compose up -d

            echo "✅ Deployment done"