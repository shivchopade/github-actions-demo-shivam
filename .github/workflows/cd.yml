name: TWS CD Workflow

on:
  workflow_run:
    workflows: ["TWS CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="github-actions-demo-shivam"

            # Clone only once
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/shivchopade/github-actions-demo-shivam.git
            fi

            cd "$REPO_DIR"

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "🔍 Checking for new Docker image..."
            IMAGE="shiv9/githubactions:latest"

            # Check if new image exists
            docker pull $IMAGE > /tmp/docker_pull.log 2>&1

            if grep -q "Downloaded newer image" /tmp/docker_pull.log; then
              echo "🚀 New image found → restarting backend only"
              docker compose up -d --no-deps backend
            else
              echo "⚡ No new image → skipping backend restart"
            fi

            echo "🌐 Restarting nginx (for frontend updates)"
            docker compose restart nginx

            echo "✅ Deployment completed"