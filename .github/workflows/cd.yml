name: TWS CD Workflow

on:
  workflow_run:
    workflows: ["TWS CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="github-actions-demo-shivam"

            # Clone repo if not exists
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://github.com/shivchopade/github-actions-demo-shivam.git
            fi

            cd "$REPO_DIR"

            # Force-sync with remote (this is the key fix)
            # git pull can fail silently if there are local changes
            git fetch origin main
            git reset --hard origin/main

            # Pull latest backend image from DockerHub
            docker compose pull

            # Recreate all containers with fresh volume mounts
            docker compose down
            docker compose up -d --force-recreate

            echo "=== Deployment complete ==="
            echo "Frontend files:"
            ls -la frontend/
            echo "Nginx config:"
            cat nginx/nginx.conf | head -20