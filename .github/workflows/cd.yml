name: TWS CD Workflow

on:
  workflow_run:
    workflows: ["TWS CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="github-actions-demo-shivam"

            # 1. Clone if missing, otherwise enter directory
            if [ ! -d "$REPO_DIR" ]; then
              echo "🌱 Cloning repository..."
              git clone https://github.com/shivchopade/github-actions-demo-shivam.git
            fi

            cd "$REPO_DIR"

            # 2. Fast and safe Git sync
            echo "🔄 Syncing latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 3. Pull latest images defined in your docker-compose.yml
            echo "⬇️ Pulling latest Docker images..."
            docker compose pull

            # 4. Smart update: Only recreates containers whose image or config changed
            echo "🚀 Applying changes..."
            docker compose up -d --remove-orphans

            echo "✅ Deployment completed rapidly!"

            