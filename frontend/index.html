<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPulse Dashboard</title>

    <script>
        (function() {
            var theme = localStorage.getItem('skillpulse-theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">
    <h2>⚡ SkillPulse</h2>
    <nav>
        <a href="#">Dashboard</a>
        <a href="#">Skills</a>
        <a href="#">Sessions</a>
        <a href="#">Analytics</a>
    </nav>
</div>

<!-- 🔥 MAIN CONTENT -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <h1>Dashboard</h1>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
    </div>

    <!-- STATS -->
    <div class="stats" id="stats">
        <div class="stat-card">
            <p>Total Skills</p>
            <h2>-</h2>
        </div>
        <div class="stat-card">
            <p>Hours Logged</p>
            <h2>-</h2>
        </div>
        <div class="stat-card">
            <p>Sessions</p>
            <h2>-</h2>
        </div>
        <div class="stat-card">
            <p>Top Skill</p>
            <h2>-</h2>
        </div>
    </div>

    <!-- SKILLS HEADER -->
    <div class="section-header">
        <h2>My Skills</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Skill</button>
    </div>

    <!-- SKILLS GRID -->
    <div class="skills-grid" id="skills-grid">
        <div class="empty-state">
            <h3>Start tracking your skills 🚀</h3>
            <p>Add your first skill to begin</p>
        </div>
    </div>

</div>

<!-- MODALS (unchanged logic) -->

<div class="modal-backdrop" id="add-skill-modal">
    <div class="modal">
        <h3>Add Skill</h3>
        <form id="add-skill-form">
            <input type="text" id="skill-name" placeholder="Skill name" required>
            <select id="skill-category">
                <option>DevOps</option>
                <option>Cloud</option>
                <option>Programming</option>
            </select>
            <input type="number" id="skill-target" placeholder="Target hours">
            <div class="form-actions">
                <button type="button" onclick="closeAddModal()">Cancel</button>
                <button type="submit">Add</button>
            </div>
        </form>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
