<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPulse Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ SkillPulse</h2>

    <nav>
        <a href="#" class="active">🏠 Dashboard</a>
        <a href="#">📚 Skills</a>
        <a href="#">🧠 Sessions</a>
        <a href="#">📊 Analytics</a>
    </nav>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div>
            <h1>Dashboard</h1>
            <p class="subtitle">Track your learning progress 🚀</p>
        </div>
        <button class="theme-toggle">🌙</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <span>📚</span>
            <div>
                <p>Total Skills</p>
                <h2>-</h2>
            </div>
        </div>

        <div class="stat-card">
            <span>⏱</span>
            <div>
                <p>Hours Logged</p>
                <h2>-</h2>
            </div>
        </div>

        <div class="stat-card">
            <span>📅</span>
            <div>
                <p>Sessions</p>
                <h2>-</h2>
            </div>
        </div>

        <div class="stat-card">
            <span>🔥</span>
            <div>
                <p>Top Skill</p>
                <h2>-</h2>
            </div>
        </div>
    </div>

    <!-- SECTION -->
    <div class="section-header">
        <h2>My Skills</h2>
        <button class="btn btn-primary">+ Add Skill</button>
    </div>

    <div class="skills-grid">
        <div class="empty-state">
            <h3>No skills yet</h3>
            <p>Start tracking your progress today 🚀</p>
        </div>
    </div>

</div>

</body>
</html>
