<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPulse — Track Your Learning</title>
    <meta name="description" content="SkillPulse: a modern dashboard to track your skills, log practice sessions, and visualize your learning progress.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        </div>
        <span class="brand-text">SkillPulse</span>
    </div>

    <nav class="sidebar-nav">
        <a href="#" class="nav-link active" id="nav-dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
        </a>
        <a href="#" class="nav-link" id="nav-skills">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>Skills</span>
        </a>
        <a href="#" class="nav-link" id="nav-sessions">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Sessions</span>
        </a>
        <a href="#" class="nav-link" id="nav-analytics">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Analytics</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="theme-switch" id="theme-toggle" role="button" tabindex="0" aria-label="Toggle theme">
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span class="theme-label">Toggle Theme</span>
        </div>
    </div>
</aside>

<!-- MOBILE HEADER -->
<header class="mobile-header">
    <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="mobile-brand">SkillPulse</span>
</header>

<!-- MAIN CONTENT -->
<main class="main">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Track your learning progress</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openAddModal()" id="add-skill-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Skill
            </button>
        </div>
    </div>

    <!-- STATS GRID -->
    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-icon stat-icon--skills">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div class="stat-info">
                <div class="label">Total Skills</div>
                <div class="value">-</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon--hours">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="stat-info">
                <div class="label">Hours Logged</div>
                <div class="value">-</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon--sessions">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="stat-info">
                <div class="label">Sessions</div>
                <div class="value">-</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon--top">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </div>
            <div class="stat-info">
                <div class="label">Top Skill</div>
                <div class="value">-</div>
            </div>
        </div>
    </div>

    <!-- SKILLS SECTION -->
    <div class="section-header">
        <h2 class="section-title">My Skills</h2>
    </div>
    <div class="skills-grid" id="skills-grid">
        <div class="empty-state" style="grid-column: 1 / -1">
            <div class="empty-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <h3>No skills yet</h3>
            <p>Click "Add Skill" to start tracking your learning journey.</p>
        </div>
    </div>

</main>

<!-- ADD SKILL MODAL -->
<div class="modal-backdrop" id="add-skill-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Add New Skill</h3>
            <button class="modal-close" onclick="closeAddModal()" aria-label="Close">&times;</button>
        </div>
        <form id="add-skill-form" autocomplete="off">
            <div class="form-group">
                <label for="skill-name">Skill Name</label>
                <input type="text" id="skill-name" placeholder="e.g. React, Docker, Go…" required>
            </div>
            <div class="form-group">
                <label for="skill-category">Category</label>
                <select id="skill-category">
                    <option value="">Select category</option>
                    <option value="Programming">Programming</option>
                    <option value="DevOps">DevOps</option>
                    <option value="Cloud">Cloud</option>
                    <option value="Design">Design</option>
                    <option value="Data">Data</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="skill-target">Target Hours</label>
                <input type="number" id="skill-target" placeholder="e.g. 50" min="0">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Skill</button>
            </div>
        </form>
    </div>
</div>

<!-- LOG SESSION MODAL -->
<div class="modal-backdrop" id="log-session-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>Log Session — <span id="log-skill-name"></span></h3>
            <button class="modal-close" onclick="closeLogModal()" aria-label="Close">&times;</button>
        </div>
        <form id="log-session-form" autocomplete="off">
            <div class="form-group">
                <label for="log-hours">Hours</label>
                <input type="number" id="log-hours" step="0.5" min="0.5" placeholder="e.g. 1.5" required>
            </div>
            <div class="form-group">
                <label for="log-date">Date</label>
                <input type="date" id="log-date" required>
            </div>
            <div class="form-group">
                <label for="log-notes">Notes <span class="optional">(optional)</span></label>
                <textarea id="log-notes" rows="3" placeholder="What did you learn?"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="closeLogModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Log Session</button>
            </div>
        </form>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
